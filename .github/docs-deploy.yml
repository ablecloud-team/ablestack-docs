mike:
  version: "4.0 Diplo"
  aliases:
    - latest
  default: latest
  branch: gh-pages

build:
  strict: true
  pdf: true

release:
  enabled_on_master: true
  timezone: Asia/Seoul
  version_prefix: 4.0-Diplo
  timestamp_format: "%Y%m%d-%H%M%S"
  prune_version_pattern: "^4\\.0-Diplo-[0-9]{8}-[0-9]{6}$"
  aliases:
    - latest
  default: latest
  dry_run: false

deploy:
  host: 211.115.222.251
  port: 10022
  user: root
  path: /usr/share/nginx/html
  dry_run: true
  auth: password

image:
  enabled: true
  name: ablestack-docs-nginx
  tag_aliases:
    - latest
  archive: true

verify:
  base_url: https://docs.ablecloud.io
